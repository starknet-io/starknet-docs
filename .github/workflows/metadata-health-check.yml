name: metadata-health-check

on:
  workflow_dispatch:
  schedule:
    - cron: "27 8 * * 1"
  pull_request:
    paths:
      - scripts/check_metadata_health.py
      - .github/workflows/metadata-health-check.yml

concurrency:
  group: metadata-health-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Check docs metadata health
        run: python3 scripts/check_metadata_health.py
